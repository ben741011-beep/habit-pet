  <g opacity="0.3" fill="#FFF">
    <path d="M95,215 C93,212 88,212 88,216 C88,220 95,224 95,224 C95,224 102,220 102,216 C102,212 97,212 95,215Z"/>
    <path d="M110,245 C109,243 106,243 106,245.5 C106,248 110,250.5 110,250.5 C110,250.5 114,248 114,245.5 C114,243 111,243 110,245Z" transform="scale(0.8) translate(22,40)"/>
