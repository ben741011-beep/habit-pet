  <!-- Dress -->
  <path d="M 78,170 L 72,172 L 56,182 C 52,184 48,188 46,192 L 46,196 C 46,196 52,196 58,194 L 52,270 C 54,278 70,290 100,290 C 130,290 146,278 148,270 L 142,194 C 148,196 154,196 154,196 L 154,192 C 152,188 148,184 144,182 L 128,172 L 122,170 Z" fill="#AB47BC" stroke="#333" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M78,170 C85,175 95,177 100,177 C105,177 115,175 122,170" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <!-- Butterfly on dress -->
  <g transform="translate(108,240)" opacity="0.3">
    <path d="M0,0 C-8,-6 -14,-3 -9,2 C-14,7 -8,10 0,3" fill="#E1BEE7"/>
