  </defs>
  <!-- Left Ear -->
  <ellipse cx="72" cy="32" rx="16" ry="42" fill="#FFF" stroke="#555" stroke-width="2.5" transform="rotate(-6,72,32)"/>
  <ellipse cx="72" cy="32" rx="8" ry="28" fill="#FFD0D9" transform="rotate(-6,72,32)" opacity="0.7"/>
  <!-- Right Ear -->
  <ellipse cx="128" cy="32" rx="16" ry="42" fill="#FFF" stroke="#555" stroke-width="2.5" transform="rotate(6,128,32)"/>
  <ellipse cx="128" cy="32" rx="8" ry="28" fill="#FFD0D9" transform="rotate(6,128,32)" opacity="0.7"/>
  <!-- Head -->
  <circle cx="100" cy="105" r="62" fill="#FFF" stroke="#555" stroke-width="2.5"/>
  <!-- L Eye -->
  <ellipse cx="80" cy="96" rx="4" ry="5" fill="#2D3436"/>
  <circle cx="78.5" cy="94.5" r="1.5" fill="#FFF" opacity="0.85"/>
