  <path d="M52,270 C60,274 78,280 100,280 C122,280 140,274 148,270" fill="none" stroke="#333" stroke-width="1.5" opacity="0.3"/>
  <!-- Left Foot -->
  <ellipse cx="78" cy="292" rx="16" ry="9" fill="#FFF" stroke="#333" stroke-width="2.5"/>
  <!-- Right Foot -->
  <ellipse cx="122" cy="292" rx="16" ry="9" fill="#FFF" stroke="#333" stroke-width="2.5"/>

  <!-- Head -->
  <circle cx="100" cy="120" r="60" fill="#FFF" stroke="#333" stroke-width="2.8"/>
  <!-- Left Eye -->
  <circle cx="80" cy="112" r="4" fill="#333"/>
  <!-- Right Eye -->
