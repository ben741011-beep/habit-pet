  <line x1="105" y1="132" x2="95" y2="140" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- Crown -->
  <g transform="translate(132,48) rotate(20)">
    <polygon points="0,16 3,0 7,10 12,0 17,10 21,0 24,16" fill="#FFD700" stroke="#DAA520" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="3" cy="3" r="1.8" fill="#E84040"/>
    <circle cx="12" cy="1" r="1.8" fill="#4A90D9"/>
    <circle cx="21" cy="3" r="1.8" fill="#66BB6A"/>
