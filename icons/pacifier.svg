<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pacifier / 奶嘴 -->
  <!-- Shield/guard -->
  <ellipse cx="50" cy="52" rx="30" ry="22" fill="#FFD54F" stroke="#F9A825" stroke-width="2.5"/>
  <!-- Holes on shield -->
  <circle cx="38" cy="46" r="3.5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <circle cx="62" cy="46" r="3.5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <!-- Nipple -->
  <ellipse cx="50" cy="74" rx="14" ry="12" fill="#FFAB91" stroke="#E64A19" stroke-width="2"/>
  <ellipse cx="50" cy="78" rx="10" ry="7" fill="#FF8A65"/>
  <!-- Ring/handle -->
  <circle cx="50" cy="32" r="12" fill="none" stroke="#90CAF9" stroke-width="5" stroke-linecap="round"/>
  <circle cx="50" cy="32" r="12" fill="none" stroke="#64B5F6" stroke-width="3" stroke-linecap="round"/>
  <!-- Shine -->
  <ellipse cx="44" cy="50" rx="4" ry="2.5" fill="rgba(255,255,255,0.5)" transform="rotate(-15 44 50)"/>
</svg>
