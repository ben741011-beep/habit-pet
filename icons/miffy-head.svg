<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF9AAA" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF9AAA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bR" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF9AAA" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF9AAA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Left Ear -->
  <ellipse cx="72" cy="40" rx="17" ry="46" fill="#FFF" stroke="#555" stroke-width="2.5" transform="rotate(-6,72,40)"/>
  <ellipse cx="72" cy="40" rx="8.5" ry="30" fill="#FFD0D9" transform="rotate(-6,72,40)" opacity="0.75"/>
  <!-- Right Ear -->
  <ellipse cx="128" cy="40" rx="17" ry="46" fill="#FFF" stroke="#555" stroke-width="2.5" transform="rotate(6,128,40)"/>
  <ellipse cx="128" cy="40" rx="8.5" ry="30" fill="#FFD0D9" transform="rotate(6,128,40)" opacity="0.75"/>
  <!-- Head -->
  <circle cx="100" cy="118" r="66" fill="#FFF" stroke="#555" stroke-width="2.5"/>
  <!-- L Eye -->
  <ellipse cx="79" cy="108" rx="4" ry="5" fill="#2D3436"/>
  <circle cx="77.5" cy="106.5" r="1.5" fill="#FFF" opacity="0.85"/>
  <!-- R Eye -->
  <ellipse cx="121" cy="108" rx="4" ry="5" fill="#2D3436"/>
  <circle cx="119.5" cy="106.5" r="1.5" fill="#FFF" opacity="0.85"/>
