<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Left Ear - tall, narrow, slightly apart -->
  <path d="M80,90 C80,30 72,2 72,2 C68,2 60,30 60,90" fill="#FFF" stroke="#333" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Right Ear -->
  <path d="M120,90 C120,30 128,2 128,2 C132,2 140,30 140,90" fill="#FFF" stroke="#333" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Head - round -->
  <circle cx="100" cy="135" r="65" fill="#FFF" stroke="#333" stroke-width="2.8"/>
  <!-- Left Eye - simple dot -->
  <circle cx="80" cy="125" r="4" fill="#333"/>
  <!-- Right Eye - simple dot -->
  <circle cx="120" cy="125" r="4" fill="#333"/>
  <!-- X Mouth - small tight x -->
  <line x1="95" y1="145" x2="105" y2="153" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="145" x2="95" y2="153" stroke="#333" stroke-width="2" stroke-linecap="round"/>
</svg>
