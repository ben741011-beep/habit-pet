  <circle cx="58" cy="126" r="12" fill="url(#bL)"/>
  <circle cx="142" cy="126" r="12" fill="url(#bR)"/>
  <!-- Nose -->
  <circle cx="100" cy="123" r="2" fill="#C9888A"/>
  <!-- X Mouth -->
  <line x1="94" y1="131" x2="100" y2="137" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="106" y1="131" x2="100" y2="137" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="94" y1="137" x2="100" y2="131" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="106" y1="137" x2="100" y2="131" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <!-- Sparkle ✨ -->
  <text x="150" y="70" font-size="18" opacity="0.7">✨</text>
