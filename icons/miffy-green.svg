<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 310">
  <defs>
    <radialGradient id="bL" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF9AAA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF9AAA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ACC7A"/>
      <stop offset="100%" stop-color="#66BB6A"/>
