  <line x1="106" y1="120" x2="100" y2="126" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="94" y1="126" x2="100" y2="120" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="106" y1="126" x2="100" y2="120" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <!-- Dress -->
  <path d="M62,162 C58,162 52,185 50,210 C48,240 52,255 60,265 C70,278 85,284 100,284 C115,284 130,278 140,265 C148,255 152,240 150,210 C148,185 142,162 138,162 Z" fill="url(#dress)" stroke="#555" stroke-width="2.5"/>
  <path d="M75,170 C72,180 70,200 72,220 C74,230 80,240 90,245" fill="none" stroke="#FFF" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
