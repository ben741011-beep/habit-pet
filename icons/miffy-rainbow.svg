<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 310">
  <defs>
    <linearGradient id="rainbow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="17%" stop-color="#FF9F43"/>
      <stop offset="33%" stop-color="#FECA57"/>
      <stop offset="50%" stop-color="#48DBFB"/>
      <stop offset="67%" stop-color="#0ABDE3"/>
      <stop offset="83%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#FD79A8"/>
