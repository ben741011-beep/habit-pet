  </defs>
  <!-- Left Ear -->
  <path d="M80,82 C80,22 72,0 72,0 C68,0 60,22 60,82" fill="#FFF" stroke="#333" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Right Ear -->
  <path d="M120,82 C120,22 128,0 128,0 C132,0 140,22 140,82" fill="#FFF" stroke="#333" stroke-width="2.8" stroke-linejoin="round"/>

  <!-- Rainbow Dress -->
  <path d="M 78,170 L 72,172 L 56,182 C 52,184 48,188 46,192 L 46,196 C 46,196 52,196 58,194 L 52,270 C 54,278 70,290 100,290 C 130,290 146,278 148,270 L 142,194 C 148,196 154,196 154,196 L 154,192 C 152,188 148,184 144,182 L 128,172 L 122,170 Z" fill="url(#rainbow)" stroke="#333" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M78,170 C85,175 95,177 100,177 C105,177 115,175 122,170" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- Sparkles -->
  <g opacity="0.5">
    <polygon points="168,110 170,115 175,115 171,118 173,123 168,120 163,123 165,118 161,115 166,115" fill="#FFD700"/>
    <polygon points="32,100 33.5,104 38,104 34.5,106 36,110 32,108 28,110 29.5,106 26,104 30.5,104" fill="#FF6B9D" transform="scale(0.8) translate(5,15)"/>
    <polygon points="170,170 171,173 174,173 171.5,175 172.5,178 170,176 167.5,178 168.5,175 166,173 169,173" fill="#48DBFB"/>
  </g>

  <!-- Left arm -->
  <path d="M46,192 C38,194 32,198 30,204 C28,210 32,214 38,214 C44,214 50,210 52,204" fill="#FFF" stroke="#333" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Right arm -->
  <path d="M154,192 C162,194 168,198 170,204 C172,210 168,214 162,214 C156,214 150,210 148,204" fill="#FFF" stroke="#333" stroke-width="2.8" stroke-linejoin="round"/>

  <path d="M52,270 C60,274 78,280 100,280 C122,280 140,274 148,270" fill="none" stroke="#333" stroke-width="1.5" opacity="0.3"/>
  <!-- Left Foot -->
  <ellipse cx="78" cy="292" rx="16" ry="9" fill="#FFF" stroke="#333" stroke-width="2.5"/>
  <!-- Right Foot -->
  <ellipse cx="122" cy="292" rx="16" ry="9" fill="#FFF" stroke="#333" stroke-width="2.5"/>

  <!-- Head -->
  <circle cx="100" cy="120" r="60" fill="#FFF" stroke="#333" stroke-width="2.8"/>
  <!-- Left Eye -->
  <circle cx="80" cy="112" r="4" fill="#333"/>
  <!-- Right Eye -->
  <circle cx="120" cy="112" r="4" fill="#333"/>
  <!-- X Mouth -->
  <line x1="95" y1="132" x2="105" y2="140" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="132" x2="95" y2="140" stroke="#333" stroke-width="2" stroke-linecap="round"/>

  <!-- Tiara -->
  <g transform="translate(100,42)">
    <polygon points="0,-14 5,-6 9,-12 14,-2 9,3 5,3 0,3 -5,3 -9,3 -14,-2 -9,-12 -5,-6" fill="#FFD700" stroke="#DAA520" stroke-width="1.2" opacity="0.8"/>
    <circle cx="0" cy="-11" r="2" fill="#FF6B9D"/>
